<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rowanyu.com</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 700px;
    }

    .card {
      background: white;
      padding: 50px 40px;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    h1 {
      margin: 0 0 30px;
      color: #111827;
      font-size: 40px;
      font-weight: 700;
    }

    h2 {
      margin: 35px 0 16px;
      color: #374151;
      font-size: 20px;
      font-weight: 600;
    }

    .btn {
      display: block;
      width: 100%;
      max-width: 320px;
      margin: 12px auto;
      padding: 15px 20px;
      text-decoration: none;
      border-radius: 14px;
      font-weight: 600;
      font-size: 17px;
      transition: all 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .primary {
      background: #2563eb;
      color: white;
    }

    .primary:hover {
      background: #1d4ed8;
    }

    .secondary {
      background: #f3f4f6;
      color: #111827;
    }

    .secondary:hover {
      background: #e5e7eb;
    }

    @media (max-width: 600px) {
      .card {
        padding: 35px 20px;
        border-radius: 18px;
      }

      h1 {
        font-size: 30px;
      }

      h2 {
        font-size: 18px;
      }

      .btn {
        font-size: 16px;
        padding: 14px 16px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <h1>Welcome</h1>

      <a class="btn primary"
         href="https://rowanfffff.github.io/discipline-checkin/"
         target="_blank">
        Discipline Check-in
      </a>

      <h2>Resources</h2>

      <a class="btn secondary" href="#">Math</a>
      <a class="btn secondary" href="#">CS</a>
      <a class="btn secondary" href="#">Other</a>
    </div>
  </div>
</body>
</html>
