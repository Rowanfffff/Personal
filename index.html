<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rowanyu.com</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 800px;
      padding: 40px 0;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #111827;
    }

    details {
      margin: 14px 0;
      background: #f9fafb;
      border-radius: 14px;
      padding: 14px 18px;
      border: 1px solid #e5e7eb;
    }

    summary {
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      color: #111827;
    }

    .sub {
      margin-top: 12px;
      margin-left: 12px;
    }

    .links a {
      display: block;
      padding: 8px 0;
      color: #2563eb;
      text-decoration: none;
      word-break: break-word;
    }

    .links a:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .card {
        padding: 24px;
      }

      summary {
        font-size: 16px;
      }
    }
    .floating-checkin {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 52px;
      height: 52px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 28px;
      font-weight: bold;
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.35);
      transition: all 0.2s ease;
      z-index: 1000;
    }
    
    .floating-checkin:hover {
      background: #1d4ed8;
      transform: translateY(-2px) scale(1.05);
    }
    
    @media (max-width: 600px) {
      .floating-checkin {
        width: 44px;
        height: 44px;
        font-size: 22px;
        top: 14px;
        right: 14px;
      }
    }
  </style>
</head>
<body>
  <a class="floating-checkin"
    href="https://rowanfffff.github.io/discipline-checkin/"
    target="_blank"
    title="Discipline Check-in">
    ✓
  </a>
  <div class="container">
    <div class="card">
      <h1>Welcome</h1>
      <details>
        <summary>Math</summary>

        <div class="sub">
          <details>
            <summary>Linear Algebra</summary>

            <div class="links">
              
            </div>
          </details>
        </div>
      </details>

      <details>
        <summary>CS</summary>
      </details>

      <details>
        <summary>Other</summary>
      </details>

    </div>
  </div>
</body>
</html>
